version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose: Kafka + Zookeeper + API
#
# To run with Kafka:
#   1. Set "Kafka:Enabled": true in appsettings.json
#   2. docker-compose up -d
#   3. The API will publish/consume events via Kafka at localhost:9092
#
# To run without Kafka (local dev):
#   1. Keep "Kafka:Enabled": false in appsettings.json
#   2. dotnet run from EnterpriseApi.API directory
#   3. NullEventPublisher is used — events are logged but not published
# ─────────────────────────────────────────────────────────────────────────────

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: enterprise-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: enterprise-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: one for internal Docker network, one for host machine
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Retain messages for 7 days
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: enterprise-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  api:
    build:
      context: .
      dockerfile: EnterpriseApi.API/Dockerfile
    container_name: enterprise-api
    depends_on:
      - kafka
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/enterprise.db
      - Kafka__Enabled=true
      - Kafka__BootstrapServers=kafka:29092
    volumes:
      - api-data:/app/data

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  api-data:
