name: CI — Build, Test, Scan

# Triggers on every push to any branch and every pull request targeting main.
# This means every developer's branch gets validated before it can be merged.
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, staging]

env:
  DOTNET_VERSION: '9.0.x'
  # Speeds up NuGet restore by caching packages between runs
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ─── Job 1: Build and Unit Test ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # fetch-depth: 0 gives full git history — needed for versioning tools
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Cache NuGet packages — saves 30-60 seconds on every run
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore EnterpriseApi.sln

      - name: Build solution
        run: |
          dotnet build EnterpriseApi.sln \
            --configuration Release \
            --no-restore \
            /p:TreatWarningsAsErrors=true

      # Run tests with code coverage collection
      # The coverage output is used by the coverage gate below
      - name: Run tests with coverage
        run: |
          dotnet test EnterpriseApi.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      # Fail the build if coverage drops below 80%
      # Install the coverage tool once globally and reuse via cache
      - name: Install coverage report tool
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:./coverage/**/coverage.cobertura.xml \
            -targetdir:./coverage/report \
            -reporttypes:TextSummary

      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(grep -oP 'Line coverage: \K[\d.]+' ./coverage/report/Summary.txt)
          echo "Line coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below the required 80% threshold"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets the threshold"

      # Upload coverage as an artifact so you can download and inspect it
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report
          retention-days: 30

  # ─── Job 2: Security Scanning ───────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # Run in parallel with build — don't block on each other
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Check every NuGet package for known CVEs
      # This catches things like log4shell-equivalent vulnerabilities in dependencies
      - name: Scan NuGet packages for vulnerabilities
        run: |
          dotnet restore EnterpriseApi.sln
          dotnet list EnterpriseApi.sln package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "❌ Vulnerable packages found:"
            cat vuln-report.txt
            exit 1
          fi
          echo "✅ No vulnerable packages found"

      # Scan for hardcoded secrets — API keys, passwords, tokens in source code
      # This catches mistakes like accidentally committing a real JWT secret
      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # Static Application Security Testing — scans C# code for security issues
      # like SQL injection patterns, insecure deserialization, missing auth checks
      - name: Run Security Code Scan (SAST)
        uses: security-code-scan/security-code-scan-add-action@main

      - name: Upload SAST results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-code-scan.sarif

  # ─── Job 3: Docker Build Validation ─────────────────────────────────────────
  # Validates the Dockerfile builds correctly on every PR
  # Full push to ECR only happens in the CD pipeline on main/staging
  docker-validate:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx for multi-platform builds and better caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: EnterpriseApi.API/Dockerfile
          push: false  # Don't push — just validate it builds
          tags: enterprise-api:validation
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the built image for OS-level CVEs
      # Catches vulnerabilities in the base .NET runtime image itself
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enterprise-api:validation
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'  # Fail on CRITICAL or HIGH severity findings

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
